<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AddCourse</title>
    <link rel="stylesheet" href="design.css">

</head>
<body>


<div class="container">
    <h2>Add Course</h2>

    <form th:action="@{/save}"   th:object="${data}" th:method="post" >
        <label>Course Name</label>
        <input type="text"  name="coursename" th:field="*{coursename}">

        <label>Course Year</label>
        <input type="text" name="courseyear" th:field="*{courseyear}" >

        <input type="submit">


        <a th:href="@{/managestudent}" class="btn">Home</a>
    </form>
</div>

</body>
</html>
