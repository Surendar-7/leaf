<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AddCourse</title>
    <link rel="stylesheet" href="design.css">

</head>
<body>


<div class="container">
    <h2>Add Course</h2>

    <form th:action="@{/save}" th:method="get"  th:object="${data}">
        <label>Course Name</label>
        <input type="text"  th:field="*{coursename}">

        <label>Course Year</label>
        <input type="text"  th:field="*{courseyear}" >

        <input type="submit" value="Add Course">


        <a href="ManageStudents.html" class="btn">Home</a>
    </form>
</div>

</body>
</html>
