<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>CreateExam</title>

    <style>

        body{
            font-family: Arial;
            background:#e9e9ef;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:white;
            padding:35px;
            width:350px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        label{
            font-size:14px;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border-radius:6px;
            border:1px solid #ccc;
        }

        .btn{
            width:100%;
            padding:10px;
            border:none;
            border-radius:6px;
            background:linear-gradient(90deg,#4b4bd4,#6a5cff);
            color:white;
            font-size:15px;
            cursor:pointer;
            margin-top:5px;
        }

        .btn:hover{
            opacity:0.9;
        }

    </style>
</head>

<body>

<div class="card">

    <h2>Add Student</h2>

    <form th:action="@{/CreateExam}" th:object="${CreateExamEntity}" method="post">

        <label>Exam Name</label>
        <input type="text"  th:field="*{examname}" >

        <label>Course Year</label>
        <input type="text" th:field="*{courseyear}">

        <label>Course Name</label>
        <input type="text"  th:field="*{coursename}" >

        <button class="btn" type="submit">Submit</button>

        <a th:href="@{/managestudent}" style="text-decoration:none">
            <button type="button" class="btn">Home</button>
        </a>

    </form>

</div>

</body>
</html>
